seed: 42
label_order: [baseline, stress, amusement]
device: auto  # "cuda", "cpu", or "auto"

data:
  dataset_path: data/processed/wesad/hf_dataset
  train_frac: 0.7
  val_frac: 0.15

model:
  hidden_sizes: [256, 128]
  dropout: 0.2

optimizer:
  learning_rate: 0.001
  weight_decay: 0.0001

training:
  epochs: 50
  batch_size: 64
  num_workers: 0
  output_dir: runs/wesad
  save_model: true
  metrics_filename: metrics.json
